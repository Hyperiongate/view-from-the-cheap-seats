<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learn Something New — View from the Cheap Seats</title>
  <meta name="description" content="A random five-minute lesson powered by AI. Learn something you didn't know yesterday." />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* Page-specific overrides */
    .lesson-wrapper {
      max-width: 720px;
      margin: 0 auto;
    }

    .lesson-intro {
      text-align: center;
      padding: 2.5rem 0 2rem;
    }

    .lesson-intro p {
      font-size: 0.95rem;
      color: var(--muted);
      font-style: italic;
      line-height: 1.7;
      max-width: 480px;
      margin: 0 auto;
    }

    .generate-btn {
      display: block;
      margin: 0 auto 2.5rem;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.85rem 2.4rem;
      font-family: var(--font-display);
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.2s, transform 0.1s;
    }

    .generate-btn:hover { background: var(--accent-dark); }
    .generate-btn:active { transform: scale(0.98); }
    .generate-btn:disabled { background: #aaa; cursor: not-allowed; }

    .lesson-divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin-bottom: 2.5rem;
    }

    /* States */
    .state-idle {
      text-align: center;
      padding: 3rem 0;
    }

    .state-idle p {
      font-size: 1rem;
      font-style: italic;
      color: var(--muted);
      line-height: 1.7;
    }

    .state-loading {
      display: none;
      text-align: center;
      padding: 3rem 0;
    }

    .loading-label {
      font-size: 0.75rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 400;
      margin-bottom: 1.2rem;
    }

    .loading-bar {
      width: 160px;
      height: 2px;
      background: var(--border);
      margin: 0 auto;
      position: relative;
      overflow: hidden;
    }

    .loading-bar::after {
      content: '';
      position: absolute;
      left: -60%;
      width: 60%;
      height: 100%;
      background: var(--accent);
      animation: sweep 1.2s ease-in-out infinite;
    }

    @keyframes sweep {
      0% { left: -60%; }
      100% { left: 110%; }
    }

    /* Lesson card */
    .lesson-card {
      display: none;
      animation: fadeUp 0.45s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .lesson-meta {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 1.25rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .lesson-category {
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .lesson-readtime {
      font-size: 0.75rem;
      font-style: italic;
      color: var(--muted);
    }

    .lesson-title {
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.02em;
      margin-bottom: 1.5rem;
      color: var(--text);
    }

    .lesson-body {
      font-size: 1rem;
      line-height: 1.8;
      color: var(--text);
    }

    .lesson-body p {
      margin-bottom: 1.25rem;
    }

    .lesson-takeaway {
      margin-top: 2rem;
      padding: 1rem 1.25rem;
      border-left: 3px solid var(--accent);
      background: #faf8f4;
      font-size: 0.95rem;
      font-style: italic;
      line-height: 1.7;
      color: var(--muted);
    }

    .error-msg {
      display: none;
      text-align: center;
      padding: 2rem 0;
      font-style: italic;
      color: var(--accent);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

  <header class="site-header" id="site-header"></header>

  <div class="site-wrapper">
    <div class="content-grid">

      <main>
        <div class="lesson-wrapper">

          <h1 class="page-title" style="text-align:center;">Learn Something New</h1>
          <div class="lesson-intro">
            <p>Every lesson is different. Every lesson is real. Press the button — you'll know something you didn't know two minutes ago.</p>
          </div>

          <button class="generate-btn" id="btnGenerate" onclick="generateLesson()">
            Teach me something
          </button>

          <div class="lesson-divider"></div>

          <div class="state-idle" id="stateIdle">
            <p>Your next lesson is one click away.</p>
          </div>

          <div class="state-loading" id="stateLoading">
            <p class="loading-label">Finding something interesting&hellip;</p>
            <div class="loading-bar"></div>
          </div>

          <div class="error-msg" id="errorMsg">
            Something went wrong. Give it another shot in a moment.
          </div>

          <div class="lesson-card" id="lessonCard">
            <div class="post-card">
              <div class="lesson-meta">
                <span class="lesson-category" id="lessonCategory"></span>
                <span class="lesson-readtime">~3 minute read</span>
              </div>
              <h2 class="lesson-title" id="lessonTitle"></h2>
              <div class="lesson-body" id="lessonBody"></div>
              <div class="lesson-takeaway" id="lessonTakeaway"></div>
            </div>
          </div>

        </div>
      </main>

      <aside class="sidebar" id="sidebar"></aside>
    </div>
  </div>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="js/components.js"></script>
  <script>
    renderHeader('');
    renderSidebar();
    renderFooter();

    async function generateLesson() {
      const btn = document.getElementById('btnGenerate');
      const idle = document.getElementById('stateIdle');
      const loading = document.getElementById('stateLoading');
      const lessonCard = document.getElementById('lessonCard');
      const errorMsg = document.getElementById('errorMsg');

      btn.disabled = true;
      btn.textContent = 'Finding a topic…';
      idle.style.display = 'none';
      lessonCard.style.display = 'none';
      errorMsg.style.display = 'none';
      loading.style.display = 'block';

      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            system: `You write crisp, intelligent short lessons. Pick ONE genuinely interesting topic completely at random from any domain: history, science, mathematics, language, food, psychology, geography, music, economics, nature, technology, philosophy, art, medicine, engineering, or anything else. Then write a compelling lesson about it in 300 words or fewer.

Return ONLY a JSON object with no markdown fences, no preamble:
{
  "category": "short category label (e.g. 'Natural Science', 'History', 'Psychology')",
  "title": "A sharp, specific title for the lesson",
  "paragraphs": ["paragraph 1", "paragraph 2", "paragraph 3"],
  "takeaway": "One memorable sentence the reader will remember tomorrow."
}

Rules:
- The topic must be genuinely random and varied across every possible domain. Surprise the reader.
- Total word count across all paragraphs must be 300 words or fewer.
- 3-4 paragraphs, each 60-90 words. Engaging, clear, no fluff.
- No bullet points. Prose only.
- The takeaway is a single elegant sentence.
- Return only the JSON object, nothing else.`,
            messages: [{ role: 'user', content: 'Give me a random lesson.' }]
          })
        });

        const data = await response.json();
        const text = data.content.map(b => b.text || '').join('');
        const clean = text.replace(/```json|```/g, '').trim();
        const lesson = JSON.parse(clean);

        document.getElementById('lessonCategory').textContent = lesson.category;
        document.getElementById('lessonTitle').textContent = lesson.title;
        document.getElementById('lessonBody').innerHTML = lesson.paragraphs.map(p => `<p>${p}</p>`).join('');
        document.getElementById('lessonTakeaway').textContent = lesson.takeaway;

        loading.style.display = 'none';
        lessonCard.style.display = 'block';

        btn.textContent = 'Teach me something else';
        btn.disabled = false;

      } catch (err) {
        console.error('Lesson generation failed:', err);
        loading.style.display = 'none';
        errorMsg.style.display = 'block';
        btn.textContent = 'Teach me something';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
