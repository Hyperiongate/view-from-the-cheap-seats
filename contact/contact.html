<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — View from the Cheap Seats</title>
  <meta name="description" content="Get in touch with James Dillingham. Questions, feedback, or disagreements welcome." />
  <link rel="canonical" href="https://jamesdillingham.com/contact.html" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Contact — View from the Cheap Seats" />
  <meta property="og:description" content="Get in touch with James Dillingham. Questions, feedback, or disagreements welcome." />
  <meta property="og:url" content="https://jamesdillingham.com/contact.html" />
  <meta property="og:image" content="https://jamesdillingham.com/assets/hero.jpg" />
  <meta property="og:site_name" content="View from the Cheap Seats" />
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="site-header" id="site-header"></header>

  <div class="site-wrapper">
    <div class="content-grid">

      <main>
        <h1 class="page-title">Get in Touch</h1>
        <p class="page-subtitle">I read everything. I can't promise I'll respond to everything, but I read it.</p>

        <div class="contact-form">
          <form id="contact-form" onsubmit="handleContact(event)">

            <!-- Honeypot anti-spam -->
            <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off" />

            <div class="form-group">
              <label for="contact-name">Your Name</label>
              <input type="text" id="contact-name" name="name" placeholder="First and last" required />
            </div>

            <div class="form-group">
              <label for="contact-email">Email Address</label>
              <input type="email" id="contact-email" name="email" placeholder="your@email.com" required />
            </div>

            <div class="form-group">
              <label for="contact-subject">Subject</label>
              <input type="text" id="contact-subject" name="subject" placeholder="What's this about?" />
            </div>

            <div class="form-group">
              <label for="contact-message">Message</label>
              <textarea id="contact-message" name="message" placeholder="Say what's on your mind. You don't have to agree with me." required></textarea>
            </div>

            <button type="submit" class="btn" id="contact-btn">Send Message</button>

            <p class="mt-2" style="font-size:0.8rem; color:var(--muted); font-style:italic;">
              Your information won't be shared or sold.
            </p>
          </form>

          <div id="contact-success" style="display:none; padding:1.5rem; background:var(--sidebar-bg); border:1px solid var(--border); border-radius:2px; margin-top:1.5rem;">
            <strong>Message sent.</strong> I'll get back to you if I can.
          </div>

          <div id="contact-error" style="display:none; padding:1.5rem; background:#fdf2f2; border:1px solid #e8aaaa; border-radius:2px; margin-top:1.5rem;">
            <strong>Something went wrong.</strong> Try again, or email me directly at Jim@shift-work.com.
          </div>
        </div>
      </main>

      <aside class="sidebar" id="sidebar"></aside>
    </div>
  </div>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="js/components.js"></script>
  <script>
    renderHeader('Contact');
    renderSidebar();
    renderFooter();

    async function handleContact(e) {
      e.preventDefault();

      const honeypot = e.target.querySelector('input[name="_gotcha"]');
      if (honeypot && honeypot.value) return;

      const form = e.target;
      const btn = document.getElementById('contact-btn');
      const data = {
        name:     form.querySelector('#contact-name').value.trim(),
        email:    form.querySelector('#contact-email').value.trim(),
        _subject: form.querySelector('#contact-subject').value.trim() || 'Contact form — View from the Cheap Seats',
        message:  form.querySelector('#contact-message').value.trim(),
      };

      btn.disabled = true;
      btn.textContent = 'Sending...';

      try {
        const res = await fetch('https://formspree.io/f/xzdypeyp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
          body: JSON.stringify(data)
        });

        if (res.ok) {
          form.style.display = 'none';
          document.getElementById('contact-success').style.display = 'block';
        } else {
          throw new Error('Form submission failed');
        }
      } catch (err) {
        console.error('Contact form error:', err);
        document.getElementById('contact-error').style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Send Message';
      }
    }
  </script>
</body>
</html>
